<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            text-align:center;
        }

        .container{
            padding:40px;
        }

        h1{
            font-size:100px;
            margin-bottom:10px;
        }

        h2{
            font-size:32px;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            margin-bottom:30px;
        }

        a{
            text-decoration:none;
            background:white;
            color:#2a5298;
            padding:12px 25px;
            border-radius:25px;
            font-weight:bold;
            transition:0.3s;
        }

        a:hover{
            background:#f1f1f1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for doesn't exist.</p>
        <a href="index.html">Go Back Home</a>
    </div>

</body>
</html>
